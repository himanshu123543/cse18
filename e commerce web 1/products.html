<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Products</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        header{
            background:#222;
            color:white;
            padding:15px 40px;
        }

        header h1{
            margin:0;
        }

        .products{
            padding:40px;
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap:20px;
        }

        .product{
            background:white;
            padding:15px;
            text-align:center;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .product img{
            width:100%;
            height: 222px;;
            object-fit:cover;
            border-radius:6px;
        }

        .product h3{
            margin:17px 0;
        }

        .price{
            color:rgb(7, 16, 7);
            font-weight:bold;
        }

        .product a{
            display:inline-block;
            margin-top:10px;
            padding:8px 14px;
            background:#ff5722;
            color:white;
            text-decoration:none;
            border-radius:4px;
        }

        .product a:hover{
            background:#e64a19;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:10px;
            margin-top:20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Our Products</h1>
</header>
<h2><a href="project 1.html">Back to Home</a></h2>
<h2><a href="order.html">ORDER</a></h2>
<section class="products">

    <div class="product">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_nEb_oM45XUZxYwdTRaiaKKGlxSbeCjbDAjv98l_45w&s" alt="Mobile">
        <h3>Smartphone</h3>
        <button>ADD TO CART</button>
        <p class="price">₹15,999</p>
    </div>

    <div class="product">
        <img src="image.png" alt="Laptop">
        <h3>Laptop</h3>
          <button>ADD TO CART</button>
        <p class="price">₹45,999</p>
        
    </div>

    <div class="product">
        <img src="image copy.png" alt="Headphone">
        <h3>Headphones</h3>
          <button>ADD TO CART</button>
        <p class="price">₹1,999</p>

    </div>

    <div class="product">
        <img src="image copy 2.png" alt="Watch">
        <h3>Smart Watch</h3>
          <button>ADD TO CART</button>
        <p class="price">₹2,999</p>
    
    </div>

    <div class="product">
        <img src="image copy 3.png" alt="Tablet">
        <h3>Tablet</h3>
          <button>ADD TO CART</button>
        <p class="price">₹18,499</p>
    
    </div>

    <div class="product">
        <img src="image copy 5.png" alt="Camera">
        <h3>Camera</h3>
          <button>ADD TO CART</button>
        <p class="price">₹32,999</p>
    
    </div>

</section>

<footer>
    © 2025 My E-Commerce Website
</footer>

</body>
</html>
