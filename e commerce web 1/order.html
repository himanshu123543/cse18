<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Place Order</title>
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#fff8e1;
    }
    header{
      background:#161407;
      color:white;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }
    .container{
      width:90%;
      max-width:900px;
      margin:30px auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }
    h2{
      border-bottom:2px solid #ff9800;
      padding-bottom:5px;
      color:#333;
    }
    .row{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }
    .col{
      flex:1;
      min-width:250px;
    }
    label{
      display:block;
      margin:10px 0 5px;
      font-size:14px;
    }
    input, textarea, select{
      width:100%;
      padding:8px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }
    textarea{ resize:none; }
    .order-summary{
      background:#f9f9f9;
      padding:15px;
      border-radius:8px;
      margin-top:15px;
      font-size:14px;
    }
    .order-summary p{
      display:flex;
      justify-content:space-between;
      margin:5px 0;
    }
    .total{
      font-weight:bold;
      font-size:16px;
      border-top:1px solid #ccc;
      padding-top:8px;
      margin-top:8px;
    }
    .payment{
      margin-top:15px;
    }
    .place-btn{
      width:100%;
      margin-top:20px;
      padding:12px;
      background:#4caf50;
      border:none;
      color:white;
      font-size:16px;
      border-radius:25px;
      cursor:pointer;
      transition:0.3s;
    }
    .place-btn:hover{
      background:#43a047;
    }
    footer{
      text-align:center;
      margin-top:20px;
      font-size:13px;
      color:#777;
    }
  </style>
</head>
<body>
<h3><a href="project 1.html">HOME</a></h3>
<h3><a href="Products.html">VIEW PRODUCT</a></h3>
<header>MY SHOP – Place Order</header>

<div class="container">
  <h2>Delivery Details</h2>
  <div class="row">
    <div class="col">
      <label>Full Name</label>
      <input type="text" placeholder="Your Name">

      <label>Mobile Number</label>
      <input type="text" placeholder="10 digit mobile">

      <label>City</label>
      <input type="text" placeholder="City">
    </div>
    <div class="col">
      <label>Address</label>
      <textarea rows="5" placeholder="House No, Area, Landmark"></textarea>

      <label>State</label>
      <input type="text" placeholder="State">

      <label>Pincode</label>
      <input type="text" placeholder="Pincode">
    </div>
  </div>

  

 
  <footer>THANK YOU::: VISIT AGAIN
</div>

</body>
</html>
