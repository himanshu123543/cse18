<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyShop - E-Commerce</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
header{
    background:#222;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header h1{
    margin:0;
}
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}
nav a:hover{
    text-decoration:underline;
}

/* BANNER */
.banner{
    height:350px;
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("https://th.bing.com/th/id/OIP.cnBMJxuwckDzh4PXM0E_0QHaEM?w=279&h=180&c=7&r=0&o=7&cb=ucfimg2&dpr=1.3&pid=1.7&rm=3&ucfimg=1");
    background-size:cover;
    background-position:center;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.banner h2{
    font-size:40px;
    margin:0;
}
.banner p{
    font-size:18px;
    margin-top:10px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:2px;
    padding:40px;
}

.card{
    background:white;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

.price{
    margin:10px 0;
    font-size:18px;
}
.old{
    text-decoration:line-through;
    color:gray;
    margin-right:8px;
}
.new{
    color:green;
    font-weight:bold;
}

.btn{
    background:#ff512f;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
.btn:hover{
    background:#dd2476;
}

/* FOOTER */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
    <h1>MyShop</h1>
    <nav>
        
        <a href="products.html">PRODUCTS</a>
        <a href="order.html">ORDER</a>
    
    </nav>
</header>

<section class="banner">
    <h2>Welcome to MyShop</h2>
    <p>Best Products at Best Prices</p>
</section>

<section class="products">

<div class="card">
    <img src="https://th.bing.com/th?q=T-Shirt+Print+Design&w=120&h=120&c=1&rs=1&qlt=70&o=7&cb=1&dpr=1.3&pid=InlineBlock&rm=3&ucfimg=1" alt="T-Shirt">
    <h3>T-Shirt</h3>
    <div class="price">
        <span class="old">₹999</span>
        <span class="new">₹700</span>
    </div>
    <button class="btn">Add to Cart</button>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1000&q=80" alt="Shoes">
    <h3>Shoes</h3>
    <div class="price">
        <span class="old">₹1999</span>
        <span class="new">₹1499</span>
    </div>
    <button class="btn">Add to Cart</button>
</div>

<div class="card">
    <img src="https://pngimg.com/uploads/watches/watches_PNG9863.png" alt="Watch">
    <h3>Watch</h3>
    <div class="price">
        <span class="old">₹2499</span>
        <span class="new">₹1999</span>
    </div>
    <button class="btn">Add to Cart</button>
</div>

<div class="card">
    <img src="https://images.pexels.com/photos/159463/headphones-instagram-video-games-razer-159463.jpeg" alt="Headphones">
    <h3>Headphones</h3>
    <div class="price">
        <span class="old">₹1499</span>
        <span class="new">₹1299</span>
    </div>
    <button class="btn">Add to Cart</button>
</div>

</section>

<footer>
    <p>© 2025 MyShop | All Rights Reserved</p>
</footer>

</body>
</html>
